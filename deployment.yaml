apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-demo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: k8s-demo-app
  template:
    metadata:
      labels:
        app: k8s-demo-app
    spec:
      containers:
        - name: k8s-demo-app
          image: 662322294430.dkr.ecr.us-east-1.amazonaws.com/k8s-demo-app:v1
          ports:
            - containerPort: 5000